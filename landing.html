<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faro — Enlighten your finances</title>
  <style>
    :root {
      --bg: #07070a;
      --fg: #eaebdb;
      --dim: rgba(234, 235, 219, 0.55);
      --faint: rgba(234, 235, 219, 0.28);
    }
    html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; color: var(--fg); }
    body { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; }
    canvas { display: block; cursor: default; }
    canvas.is-pointer { cursor: pointer; }

    .hud {
      position: fixed; inset: 0;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 0 24px 8vh;
      text-align: center;
    }
    .tagline {
      margin: 0;
      font-size: clamp(14px, 1.6vw, 18px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 400;
      transition: opacity 600ms ease, transform 600ms ease;
    }
    .hint {
      margin: 14px 0 0;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
      transition: opacity 400ms ease;
    }
    .hint .dot {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--faint); margin: 0 8px 2px; vertical-align: middle;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.4); }
    }
    .hud.is-revealed .tagline { opacity: 0; transform: translateY(-6px); }
    .hud.is-revealed .hint { opacity: 0; }

    .back {
      position: fixed; top: 22px; left: 22px;
      pointer-events: auto;
      background: transparent; border: 1px solid rgba(234, 235, 219, 0.2);
      color: var(--fg); font: inherit; font-size: 11px;
      padding: 8px 14px; border-radius: 999px; cursor: pointer;
      letter-spacing: 0.15em; text-transform: uppercase;
      opacity: 0; transform: translateY(-4px);
      transition: opacity 400ms ease, transform 400ms ease, background 200ms ease;
    }
    .back:hover { background: rgba(234, 235, 219, 0.08); }
    .back.is-visible { opacity: 0.8; transform: translateY(0); }

    .a11y {
      position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="hud" id="hud">
    <p class="tagline">Enlighten your finances</p>
    <p class="hint"><span class="dot"></span>Click the logo<span class="dot"></span></p>
  </div>
  <button class="back" id="back" type="button" aria-label="Back to logo">← Back</button>

  <nav class="a11y" aria-label="Download Faro">
    <a href="https://apps.apple.com/" id="link-ios">Download on the App Store</a>
    <a href="https://play.google.com/" id="link-android">Get it on Google Play</a>
  </nav>

  <script type="module">
    import * as THREE from 'three';
    import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ---------- renderer / scene ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);
    const canvas = renderer.domElement;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07070a);
    scene.fog = new THREE.Fog(0x07070a, 1200, 2400);

    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 4000);
    camera.position.set(0, 0, 950);

    // PBR environment so metallic surfaces have something to reflect
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    // ---------- lights ----------
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const key = new THREE.DirectionalLight(0xfff2d8, 1.2);
    key.position.set(300, 500, 600);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x88aaff, 0.6);
    rim.position.set(-400, -200, -300);
    scene.add(rim);

    // ---------- post-processing ----------
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.22,  // strength
      0.4,   // radius
      0.38,  // threshold — only the brightest pixels bloom
    );
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    // ---------- shared material for logo + cards ----------
    const goldMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xeaebdb,
      metalness: 0.55,
      roughness: 0.32,
      clearcoat: 0.6,
      clearcoatRoughness: 0.25,
      emissive: 0xeaebdb,
      emissiveIntensity: 0.08,
    });

    const cardBaseMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x14141a,
      metalness: 0.6,
      roughness: 0.4,
      clearcoat: 0.4,
      clearcoatRoughness: 0.35,
    });

    // ---------- logo ----------
    const logoPivot = new THREE.Group();
    const logoTilt = new THREE.Group();   // mouse tilt (lerped target)
    const logoSpin = new THREE.Group();   // flip rotation
    logoPivot.add(logoTilt);
    logoTilt.add(logoSpin);
    scene.add(logoPivot);

    const logoFull = new THREE.Group();   // faro_logo.svg — front face
    const logoIcon = new THREE.Group();   // faro_icon.svg — back face (post-flip)
    logoSpin.add(logoFull);
    logoSpin.add(logoIcon);
    logoIcon.visible = false;

    const TARGET_LOGO_HEIGHT = 480;
    const EXTRUDE_OPTS = {
      depth: 110,
      bevelEnabled: true,
      bevelThickness: 18,
      bevelSize: 14,
      bevelOffset: 0,
      bevelSegments: 16,
      curveSegments: 48,
      steps: 1,
    };

    function loadLogoInto(url, outerGroup) {
      // outerGroup → inner (Y-flipped for SVG coords) → meshes.
      // Each SVG is fit independently to TARGET_LOGO_HEIGHT so the in-flight swap is seamless.
      const inner = new THREE.Group();
      inner.scale.y = -1;
      outerGroup.add(inner);
      new SVGLoader().load(url, (data) => {
        for (const path of data.paths) {
          for (const shape of SVGLoader.createShapes(path)) {
            const geom = new THREE.ExtrudeGeometry(shape, EXTRUDE_OPTS);
            inner.add(new THREE.Mesh(geom, goldMaterial));
          }
        }
        const box = new THREE.Box3().setFromObject(inner);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        inner.position.set(-center.x, -center.y, -center.z);
        outerGroup.scale.setScalar(TARGET_LOGO_HEIGHT / size.y);
      });
    }

    loadLogoInto('faro_logo.svg', logoFull);
    loadLogoInto('faro_icon.svg', logoIcon);

    // ---------- cards ----------
    function roundedRectShape(w, h, r) {
      const shape = new THREE.Shape();
      shape.moveTo(-w/2 + r, -h/2);
      shape.lineTo(w/2 - r, -h/2);
      shape.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
      shape.lineTo(w/2, h/2 - r);
      shape.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
      shape.lineTo(-w/2 + r, h/2);
      shape.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
      shape.lineTo(-w/2, -h/2 + r);
      shape.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
      return shape;
    }

    function makeBadgeTexture(kind) {
      const W = 1024, H = 320;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, W, H);

      const fg = '#eaebdb';
      ctx.fillStyle = fg;
      ctx.strokeStyle = fg;

      // icon (left), aligned vertically center
      const iconCx = 150, iconCy = H/2, iconR = 80;
      if (kind === 'ios') {
        // simplified apple silhouette
        ctx.beginPath();
        ctx.arc(iconCx, iconCy + 6, iconR, Math.PI * 0.05, Math.PI * 0.95, false);
        ctx.bezierCurveTo(iconCx - iconR, iconCy + iconR * 0.9, iconCx - iconR * 1.05, iconCy - iconR * 0.4, iconCx - iconR * 0.45, iconCy - iconR * 0.85);
        ctx.bezierCurveTo(iconCx - iconR * 0.15, iconCy - iconR * 1.0, iconCx + iconR * 0.15, iconCy - iconR * 1.0, iconCx + iconR * 0.45, iconCy - iconR * 0.85);
        ctx.bezierCurveTo(iconCx + iconR * 1.05, iconCy - iconR * 0.4, iconCx + iconR, iconCy + iconR * 0.9, iconCx + iconR * 0.6, iconCy + iconR * 0.95);
        ctx.closePath();
        ctx.fill();
        // leaf
        ctx.beginPath();
        ctx.ellipse(iconCx + iconR * 0.25, iconCy - iconR * 0.95, iconR * 0.18, iconR * 0.32, Math.PI * 0.25, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // play triangle
        ctx.beginPath();
        ctx.moveTo(iconCx - iconR * 0.55, iconCy - iconR);
        ctx.lineTo(iconCx + iconR * 0.85, iconCy);
        ctx.lineTo(iconCx - iconR * 0.55, iconCy + iconR);
        ctx.closePath();
        ctx.fill();
      }

      // text block (right of icon)
      const textX = 280;
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = fg;

      ctx.font = '300 56px ui-sans-serif, -apple-system, "Segoe UI", Inter, sans-serif';
      ctx.fillText(kind === 'ios' ? 'Download on the' : 'Get it on', textX, H/2 - 18);

      ctx.font = '600 116px ui-sans-serif, -apple-system, "Segoe UI", Inter, sans-serif';
      ctx.fillText(kind === 'ios' ? 'App Store' : 'Google Play', textX, H/2 + 92);

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return tex;
    }

    function createCard(kind, href) {
      const group = new THREE.Group();
      const w = 520, h = 170, depth = 28, radius = 28;
      const shape = roundedRectShape(w, h, radius);
      const geom = new THREE.ExtrudeGeometry(shape, {
        depth,
        bevelEnabled: true,
        bevelThickness: 4,
        bevelSize: 4,
        bevelSegments: 6,
        curveSegments: 16,
      });
      geom.translate(0, 0, -depth / 2);
      const base = new THREE.Mesh(geom, cardBaseMaterial);
      group.add(base);

      // badge decal floats just above the front face
      const tex = makeBadgeTexture(kind);
      const decalMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
      const decal = new THREE.Mesh(new THREE.PlaneGeometry(w - 60, (w - 60) * (320 / 1024)), decalMat);
      decal.position.z = depth / 2 + 5;
      group.add(decal);

      // a thin emissive border ring for premium feel — same shape, slightly larger,
      // rendered behind the card so it haloes when bloom hits it
      const ringShape = roundedRectShape(w + 6, h + 6, radius + 3);
      const ringGeom = new THREE.ShapeGeometry(ringShape);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0xeaebdb,
        transparent: true,
        opacity: 0.0,
        depthWrite: false,
      });
      const ring = new THREE.Mesh(ringGeom, ringMat);
      ring.position.z = -depth / 2 - 1;
      group.add(ring);

      group.userData = { kind, href, base, decal, ring, w, h, hover: 0, hoverTarget: 0 };
      group.visible = false;
      return group;
    }

    const cardA = createCard('ios', document.getElementById('link-ios').href);
    const cardB = createCard('android', document.getElementById('link-android').href);
    scene.add(cardA);
    scene.add(cardB);

    // ---------- layout (responsive) ----------
    function getLayout() {
      const portrait = window.innerWidth < window.innerHeight * 1.05;
      if (portrait) {
        return {
          logoIdleScale: 1.0,
          logoRevealedY: 220,
          logoRevealedScale: 0.55,
          cardScale: 0.85,
          cardPositions: [
            { x: 0, y: -50 },
            { x: 0, y: -260 },
          ],
        };
      }
      return {
        logoIdleScale: 1.0,
        logoRevealedY: 160,
        logoRevealedScale: 0.62,
        cardScale: 1.0,
        cardPositions: [
          { x: -310, y: -180 },
          { x: 310, y: -180 },
        ],
      };
    }
    let layout = getLayout();

    // ---------- state machine ----------
    const STATE = { IDLE: 'idle', FLIPPING: 'flipping', REVEALED: 'revealed', RETURNING: 'returning' };
    let state = STATE.IDLE;
    let stateT = 0;
    const FLIP_DURATION = 0.95;
    const RETURN_DURATION = 0.7;

    function setState(next) {
      state = next;
      stateT = 0;
      if (next === STATE.FLIPPING || next === STATE.REVEALED) {
        cardA.visible = true;
        cardB.visible = true;
      }
      hud.classList.toggle('is-revealed', next !== STATE.IDLE);
      backBtn.classList.toggle('is-visible', next === STATE.REVEALED || next === STATE.FLIPPING);
    }

    // ---------- easings ----------
    const clamp01 = (t) => Math.max(0, Math.min(1, t));
    const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
    const easeOutBack = (t) => {
      const s = 1.6;
      const u = t - 1;
      return 1 + (s + 1) * u * u * u + s * u * u;
    };

    // ---------- mouse / raycasting ----------
    const mouse = new THREE.Vector2();   // -1..1 for tilt
    const ndc = new THREE.Vector2();     // -1..1 for raycaster
    const raycaster = new THREE.Raycaster();

    canvas.addEventListener('pointermove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
      ndc.x = mouse.x;
      ndc.y = -mouse.y;
    });

    function pick() {
      raycaster.setFromCamera(ndc, camera);
      const targets = state === STATE.IDLE
        ? [logoSpin]
        : state === STATE.REVEALED
          ? [cardA, cardB]
          : [];
      const hits = raycaster.intersectObjects(targets, true);
      if (!hits.length) return null;
      let o = hits[0].object;
      while (o && o !== scene) {
        if (o === cardA) return { kind: 'card', card: cardA };
        if (o === cardB) return { kind: 'card', card: cardB };
        if (o === logoSpin || o.parent === logoSpin || o === logoGroup) return { kind: 'logo' };
        o = o.parent;
      }
      return null;
    }

    canvas.addEventListener('pointerdown', () => {
      const hit = pick();
      if (state === STATE.IDLE && hit?.kind === 'logo') {
        setState(STATE.FLIPPING);
      } else if (state === STATE.REVEALED && hit?.kind === 'card') {
        const href = hit.card.userData.href;
        if (href) window.open(href, '_blank', 'noopener');
      } else if (state === STATE.REVEALED && !hit) {
        setState(STATE.RETURNING);
      }
    });

    const hud = document.getElementById('hud');
    const backBtn = document.getElementById('back');
    backBtn.addEventListener('click', () => {
      if (state === STATE.REVEALED) setState(STATE.RETURNING);
    });

    // ---------- animation loop ----------
    const clock = new THREE.Clock();
    let time = 0;

    // current animated values (interpolated each frame)
    const cur = {
      logoY: 0,
      logoScale: 1,
      logoFlip: 0,
      logoTiltX: 0,
      logoTiltY: 0,
      cardOpacity: 0,
      cardScale: 0.6,
      cardYOffset: 80,
      emissive: 0.08,
    };

    function updateIdle(dt) {
      // breathing — slow sin wave under the mouse tilt
      const breathY = Math.sin(time * 0.5) * 0.03;
      const breathX = Math.sin(time * 0.4 + 1.3) * 0.02;
      const targetY = mouse.x * 0.28 + breathY;
      const targetX = mouse.y * 0.16 + breathX;
      cur.logoTiltY += (targetY - cur.logoTiltY) * 0.07;
      cur.logoTiltX += (targetX - cur.logoTiltX) * 0.07;

      // emissive pulse — slow heartbeat
      const pulse = 0.05 + Math.sin(time * 1.2) * 0.025 + 0.025;
      cur.emissive += (pulse - cur.emissive) * 0.05;

      // ease back to home transform
      cur.logoY += (0 - cur.logoY) * 0.08;
      cur.logoScale += (1 - cur.logoScale) * 0.08;
      cur.logoFlip += (0 - cur.logoFlip) * 0.1;
      cur.cardOpacity += (0 - cur.cardOpacity) * 0.1;
      cur.cardScale += (0.6 - cur.cardScale) * 0.1;
      cur.cardYOffset += (80 - cur.cardYOffset) * 0.1;
      if (cur.cardOpacity < 0.01) {
        cardA.visible = false;
        cardB.visible = false;
      }
    }

    function updateFlipping(dt) {
      stateT = clamp01(stateT + dt / FLIP_DURATION);
      const t = stateT;
      cur.logoFlip = easeOutBack(t) * Math.PI;
      cur.logoY = easeInOutCubic(t) * layout.logoRevealedY;
      cur.logoScale = 1 + (layout.logoRevealedScale - 1) * easeInOutCubic(t);
      // lerp tilt back to neutral so the flip stays clean
      cur.logoTiltX += (0 - cur.logoTiltX) * 0.15;
      cur.logoTiltY += (0 - cur.logoTiltY) * 0.15;
      // subtle emissive lift during flip — nothing dramatic
      const flare = 0.08 + Math.sin(t * Math.PI) * 0.18;
      cur.emissive += (flare - cur.emissive) * 0.15;

      const ct = clamp01((t - 0.45) / 0.55);
      cur.cardOpacity = easeOutCubic(ct);
      cur.cardScale = 0.6 + 0.4 * easeOutBack(ct);
      cur.cardYOffset = 80 * (1 - easeOutCubic(ct));

      if (t >= 1) setState(STATE.REVEALED);
    }

    function updateRevealed(dt) {
      // hold the flipped pose; let the logo tilt subtly with mouse
      const targetY = Math.PI + mouse.x * 0.15;
      const targetX = mouse.y * 0.08;
      cur.logoFlip += (targetY - cur.logoFlip) * 0.06;
      cur.logoTiltX += (targetX - cur.logoTiltX) * 0.06;
      cur.logoTiltY += (0 - cur.logoTiltY) * 0.06;
      cur.logoY += (layout.logoRevealedY - cur.logoY) * 0.1;
      cur.logoScale += (layout.logoRevealedScale - cur.logoScale) * 0.1;
      cur.cardOpacity += (1 - cur.cardOpacity) * 0.1;
      cur.cardScale += (1 - cur.cardScale) * 0.1;
      cur.cardYOffset += (0 - cur.cardYOffset) * 0.1;
      cur.emissive += (0.1 - cur.emissive) * 0.05;
    }

    function updateReturning(dt) {
      stateT = clamp01(stateT + dt / RETURN_DURATION);
      cur.logoFlip += (0 - cur.logoFlip) * 0.14;
      cur.logoY += (0 - cur.logoY) * 0.14;
      cur.logoScale += (1 - cur.logoScale) * 0.14;
      cur.cardOpacity += (0 - cur.cardOpacity) * 0.2;
      cur.cardScale += (0.6 - cur.cardScale) * 0.2;
      cur.cardYOffset += (80 - cur.cardYOffset) * 0.2;
      cur.emissive += (0.08 - cur.emissive) * 0.08;
      if (stateT >= 1) setState(STATE.IDLE);
    }

    // hover state on cards (raycast each frame for smooth hover)
    function updateCardHover(dt) {
      let pointerOn = null;
      if (state === STATE.IDLE) {
        raycaster.setFromCamera(ndc, camera);
        const hits = raycaster.intersectObject(logoSpin, true);
        pointerOn = hits.length ? 'logo' : null;
      } else if (state === STATE.REVEALED) {
        raycaster.setFromCamera(ndc, camera);
        const hits = raycaster.intersectObjects([cardA, cardB], true);
        if (hits.length) {
          let o = hits[0].object;
          while (o && o !== scene) {
            if (o === cardA) { pointerOn = 'cardA'; break; }
            if (o === cardB) { pointerOn = 'cardB'; break; }
            o = o.parent;
          }
        }
      }
      canvas.classList.toggle('is-pointer', pointerOn !== null);

      for (const card of [cardA, cardB]) {
        const id = card === cardA ? 'cardA' : 'cardB';
        card.userData.hoverTarget = pointerOn === id ? 1 : 0;
        card.userData.hover += (card.userData.hoverTarget - card.userData.hover) * 0.12;
      }
    }

    function applyToScene() {
      // logo
      logoTilt.rotation.x = cur.logoTiltX;
      logoTilt.rotation.y = cur.logoTiltY;
      logoSpin.rotation.y = cur.logoFlip;
      logoPivot.position.y = cur.logoY;
      logoPivot.scale.setScalar(cur.logoScale);
      goldMaterial.emissiveIntensity = cur.emissive;

      // swap full logo ↔ icon when the mesh is edge-on (≈90° into the flip),
      // so the pop is hidden by the vanishing silhouette
      const showIcon = Math.cos(cur.logoFlip) < 0;
      if (logoFull.visible === showIcon) {
        logoFull.visible = !showIcon;
        logoIcon.visible = showIcon;
      }

      // cards — apply layout positions plus hover lift
      const positions = [layout.cardPositions[0], layout.cardPositions[1]];
      [cardA, cardB].forEach((card, i) => {
        const p = positions[i];
        const h = card.userData.hover;
        card.position.x = p.x;
        card.position.y = p.y - cur.cardYOffset + h * 8;
        card.position.z = h * 18;
        card.rotation.x = (mouse.y * 0.12 + h * -0.05);
        card.rotation.y = (mouse.x * 0.18) + (i === 0 ? -0.06 : 0.06) + h * (i === 0 ? 0.04 : -0.04);
        const s = layout.cardScale * cur.cardScale * (1 + h * 0.03);
        card.scale.setScalar(s);
        card.userData.decal.material.opacity = cur.cardOpacity;
        card.userData.ring.material.opacity = cur.cardOpacity * (0.15 + h * 0.35);
      });
    }

    function tick() {
      const dt = Math.min(0.05, clock.getDelta());
      time += dt;

      if (state === STATE.IDLE) updateIdle(dt);
      else if (state === STATE.FLIPPING) updateFlipping(dt);
      else if (state === STATE.REVEALED) updateRevealed(dt);
      else if (state === STATE.RETURNING) updateReturning(dt);

      updateCardHover(dt);
      applyToScene();

      composer.render();
    }
    renderer.setAnimationLoop(tick);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloom.setSize(window.innerWidth, window.innerHeight);
      layout = getLayout();
    });
  </script>
</body>
